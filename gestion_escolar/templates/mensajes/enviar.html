{% extends 'base.html' %}
{% block title %}Nuevo Mensaje{% endblock %}
{% block page_title %}Nuevo Mensaje{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card">
      <div class="card-header bg-white">
        <i class="bi bi-envelope-plus text-primary me-2"></i>Redactar Mensaje
      </div>
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Destinatario <span class="text-danger">*</span></label>
            {{ form.para_usuario }}
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Asunto <span class="text-danger">*</span></label>
            {{ form.asunto }}
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Mensaje <span class="text-danger">*</span></label>
            {{ form.mensaje }}
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-send me-1"></i>Enviar
            </button>
            <a href="{% url 'mensajes_bandeja' %}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
